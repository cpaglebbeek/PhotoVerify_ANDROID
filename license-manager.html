<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoVault License Manager</title>
    <style>
        body { font-family: system-ui; background: #0f172a; color: white; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1e293b; padding: 30px; border-radius: 20px; border: 1px solid #334155; width: 100%; max-width: 500px; }
        input, select { width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 12px; border-radius: 8px; margin: 10px 0 20px; box-sizing: border-box; }
        button { background: #60a5fa; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .result { margin-top: 20px; background: #000; padding: 15px; border-radius: 10px; font-family: monospace; display: none; word-break: break-all; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎟️ License Manager v1.0</h2>
        <p style="color: #94a3b8; font-size: 0.9rem;">Generate activation files for PhotoVault.</p>
        
        <label>Enter Device ID (from App):</label>
        <input type="text" id="dev-id" placeholder="E.g. A1B2C3D4E5F6G7H8">

        <label>Expiration (Days from now):</label>
        <input type="number" id="expiry-days" value="30">

        <label>Status:</label>
        <select id="status">
            <option value="true">Active</option>
            <option value="false">Revoked</option>
        </select>

        <button onclick="generateLicense()">Generate Activation File</button>

        <div id="result-box" class="result">
            <p>Upload this file to:<br><span id="path-hint" style="color: #60a5fa;">/licenses/[ID].json</span></p>
            <textarea id="json-out" style="width: 100%; height: 150px; background: #111; color: #10b981; border: none;"></textarea>
            <button onclick="downloadLicense()" style="margin-top: 10px; background: #10b981;">Download .json</button>
        </div>
    </div>

    <script>
        let currentJson = null;
        let currentId = null;

        function generateLicense() {
            const id = document.getElementById('dev-id').value.trim().toUpperCase();
            if (id.length < 8) return alert("Invalid ID");
            
            const days = parseInt(document.getElementById('expiry-days').value);
            const active = document.getElementById('status').value === "true";
            
            const expiryTs = Date.now() + (days * 24 * 60 * 60 * 1000);
            
            currentId = id;
            currentJson = {
                active: active,
                expiry: expiryTs,
                message: active ? "License Verified" : "License Revoked by Admin",
                generated: new Date().toISOString()
            };

            document.getElementById('json-out').value = JSON.stringify(currentJson, null, 2);
            document.getElementById('path-hint').innerText = `/licenses/${id}.json`;
            document.getElementById('result-box').style.display = 'block';
        }

        function downloadLicense() {
            const blob = new Blob([JSON.stringify(currentJson, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentId}.json`;
            a.click();
        }
    </script>
</body>
</html>
